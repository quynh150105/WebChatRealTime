spring.application.name=ChatRealTimeBe
spring.config.import=optional:file:.env[.properties]


spring.datasource.url=jdbc:mysql://localhost:3306/chat_realtime
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.access.expiration_time=${ACCESS_TOKEN_EXPIRATION}
jwt.secret=${SECRET_KEY}
app.admin.username=${ADMIN_USERNAME}
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}
app.admin.fullName=${ADMIN_FULL_NAME}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
